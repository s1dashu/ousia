<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Ousia — a lightweight Mac client for Pi</title>
  <desc id="desc">A warm, minimal title composition beside a dark Ousia conversation window, highlighting the approximately 10 MB DMG and direct Pi connection.</desc>

  <defs>
    <linearGradient id="surface" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fdfbf9"/>
      <stop offset="1" stop-color="#f3ece7"/>
    </linearGradient>
    <clipPath id="window-clip">
      <rect x="648" y="42" width="500" height="336" rx="24"/>
    </clipPath>
  </defs>

  <rect x="1" y="1" width="1198" height="418" rx="28" fill="url(#surface)" stroke="#ded6d0" stroke-width="2"/>

  <g id="title-block" transform="translate(64 58)">
    <text x="0" y="0" dominant-baseline="hanging" fill="#75591e" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" font-weight="700" letter-spacing="2.4">MAC CLIENT FOR PI</text>
    <text x="0" y="88" dominant-baseline="hanging" fill="#241f1b" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="78" font-weight="700" letter-spacing="-4">Ousia</text>
    <text x="2" y="146" dominant-baseline="hanging" fill="#463d37" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="25" font-weight="500">Super light. Clean by design.</text>
    <text x="2" y="181" dominant-baseline="hanging" fill="#6f645e" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="21">A faster, smoother way to work with Pi.</text>

    <g id="proof-metrics" transform="translate(0 260)">
      <g>
        <text x="0" y="0" dominant-baseline="hanging" fill="#241f1b" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="24" font-weight="700">≈10 MB</text>
        <text x="0" y="34" dominant-baseline="hanging" fill="#8b7f77" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="600" letter-spacing="1.3">DMG PACKAGE</text>
      </g>
      <line x1="140" y1="2" x2="140" y2="54" stroke="#d2c7c0"/>
      <g transform="translate(170 0)">
        <text x="0" y="0" dominant-baseline="hanging" fill="#241f1b" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="24" font-weight="700">DIRECT</text>
        <text x="0" y="34" dominant-baseline="hanging" fill="#8b7f77" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="600" letter-spacing="1.3">PI RPC</text>
      </g>
      <line x1="302" y1="2" x2="302" y2="54" stroke="#d2c7c0"/>
      <g transform="translate(332 0)">
        <text x="0" y="0" dominant-baseline="hanging" fill="#241f1b" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="24" font-weight="700">SIGNED</text>
        <text x="0" y="34" dominant-baseline="hanging" fill="#8b7f77" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="600" letter-spacing="1.3">NOTARIZED</text>
      </g>
    </g>
  </g>

  <g id="product-window" clip-path="url(#window-clip)">
    <rect x="648" y="42" width="500" height="336" fill="#111110"/>
    <rect x="648" y="42" width="500" height="38" fill="#171715"/>
    <circle cx="672" cy="61" r="6" fill="#ff5f57"/>
    <circle cx="692" cy="61" r="6" fill="#febc2e"/>
    <circle cx="712" cy="61" r="6" fill="#28c840"/>
    <path d="M738 54h12v14h-12z M744 54v14" fill="none" stroke="#a8a8a3" stroke-width="1.4"/>

    <rect x="648" y="80" width="132" height="298" fill="#181816"/>
    <line x1="780" y1="80" x2="780" y2="378" stroke="#2c2c29"/>
    <text x="670" y="109" fill="#efefeb" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" font-weight="600">Chats</text>
    <text x="750" y="109" fill="#9d9d97" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17">+</text>

    <rect x="660" y="122" width="108" height="34" rx="8" fill="#2a2a27"/>
    <circle cx="674" cy="139" r="3" fill="#c9912b"/>
    <text x="686" y="143" fill="#f6f5f1" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="11" font-weight="600">New session</text>
    <text x="670" y="178" fill="#8c8c87" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="10">Refine the interface</text>
    <text x="670" y="200" fill="#8c8c87" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="10">Ship the release</text>
    <text x="670" y="222" fill="#8c8c87" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="10">Review tool output</text>
    <text x="670" y="342" fill="#9d9d97" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="10">Settings</text>

    <text x="810" y="107" fill="#f5f5f2" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" font-weight="600">New session</text>
    <rect x="922" y="126" width="190" height="42" rx="14" fill="#242421"/>
    <text x="943" y="151" fill="#deded8" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="11">Make this feel effortless.</text>

    <text x="812" y="196" fill="#cfcfc9" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="11">I’ll keep the interface focused and the flow fast.</text>
    <rect x="812" y="215" width="266" height="42" rx="9" fill="#1b1b19" stroke="#33332f"/>
    <circle cx="831" cy="236" r="8" fill="#2d2923"/>
    <path d="M827 236h8M831 232v8" stroke="#d0aa63" stroke-width="1.2"/>
    <text x="847" y="233" fill="#b9b9b3" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10">edit</text>
    <text x="847" y="247" fill="#7f7f79" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9">src/App.tsx</text>

    <rect x="805" y="292" width="310" height="66" rx="16" fill="#20201e" stroke="#343430"/>
    <text x="823" y="316" fill="#757570" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="11">Ask Pi anything…</text>
    <text x="823" y="344" fill="#aaa9a3" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9">Pi · current model</text>
    <circle cx="1093" cy="337" r="11" fill="#d2d1ca"/>
    <path d="M1093 342v-10M1089 336l4-4 4 4" fill="none" stroke="#242421" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <rect x="648" y="42" width="500" height="336" rx="24" fill="none" stroke="#383833" stroke-width="2"/>
</svg>
