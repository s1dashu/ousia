<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bash Tool Icon Options</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #0b0b0b;
        color: #f5f5f5;
      }

      body {
        margin: 0;
        padding: 32px;
        background: #0b0b0b;
      }

      main {
        display: grid;
        gap: 24px;
        max-width: 980px;
      }

      h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 650;
        letter-spacing: 0;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 14px;
      }

      .option {
        display: grid;
        gap: 10px;
        padding: 14px;
        border: 1px solid rgb(255 255 255 / 8%);
        border-radius: 10px;
        background: #151515;
      }

      .tool-row {
        display: flex;
        align-items: center;
        gap: 16px;
        height: 64px;
        padding: 0 20px;
        border-radius: 18px;
        background: #1b1b1b;
      }

      .icon-box {
        display: flex;
        width: 48px;
        height: 48px;
        flex: 0 0 auto;
        align-items: center;
        justify-content: center;
        border-radius: 14px;
        background: #080808;
        color: #b9b9b9;
      }

      .icon-box svg {
        width: 24px;
        height: 24px;
      }

      .label {
        font-size: 24px;
        font-weight: 650;
        line-height: 1;
      }

      .meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        color: #a3a3a3;
        font-size: 12px;
      }

      code {
        color: #e7e7e7;
        font-family: "SFMono-Regular", ui-monospace, Menlo, Monaco, Consolas,
          monospace;
      }

      .rank {
        color: #777;
      }
    </style>
  </head>
